# Copia este archivo a .github/workflows/sync-availability.yml en GitHub (UI o git con permiso workflow)
# y añade los secrets: ESEE_CALENDAR_ICS_URL, F3LY_CALENDAR_ICS_URL, MEDIOKILO_CALENDAR_ICS_URL

name: Sync availability bundle

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-availability-bundle
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build bundle from iCal (secrets)
        env:
          ESEE_CALENDAR_ICS_URL: ${{ secrets.ESEE_CALENDAR_ICS_URL }}
          F3LY_CALENDAR_ICS_URL: ${{ secrets.F3LY_CALENDAR_ICS_URL }}
          MEDIOKILO_CALENDAR_ICS_URL: ${{ secrets.MEDIOKILO_CALENDAR_ICS_URL }}
        run: node scripts/sync-availability-bundle.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/availability-data/bundle.json
          if git diff --staged --quiet; then
            echo "No changes to bundle"
          else
            git commit -m "chore: sync availability bundle"
            git push
          fi
